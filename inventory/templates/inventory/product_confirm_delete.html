{% extends 'inventory/base.html' %}

{% block content %}
<div class="row justify-content-center mt-2">
    <div class="col-md-5">
        <div class="card" style="border-top:3px solid #ef4444!important;">
            <div class="card-body p-4">
                <div style="width:44px;height:44px;border-radius:10px;background:#fee2e2;display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
                    <i class="fas fa-trash" style="color:#dc2626;"></i>
                </div>
                <h5 class="mb-1">Delete Product</h5>
                <p class="text-muted small mb-3">This action cannot be undone.</p>
                <p style="font-size:0.875rem;">Delete <strong>{{ object.name }}</strong> <code>{{ object.sku }}</code>?
                All associated movement records will also be removed.</p>
                <form method="post" class="d-flex gap-2 mt-4 pt-2" style="border-top:1px solid #f1f5f9;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                    <a href="{% url 'product_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

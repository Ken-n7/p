{% extends 'inventory/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="mb-3">
            <h5 class="mb-0">{{ title }}</h5>
            <p class="text-muted small mb-0">
                {% if edit_user %}Edit account details and role for {{ edit_user.username }}.
                {% else %}Create a new user and assign a role.{% endif %}
            </p>
        </div>
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 mt-4 pt-2" style="border-top:1px solid #f1f5f9;">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Save
                        </button>
                        <a href="{% url 'user_management' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
